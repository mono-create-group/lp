<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フィードバックシート | mono.create</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #0f172a; color: #f1f5f9; min-height: 100vh;
    }

    /* ── Sticky Header ── */
    .header {
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      padding: 12px 20px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 12px rgba(0,0,0,.4);
    }
    .header h1 { font-size: 1rem; font-weight: 700; color: #fff; }
    .badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 20px;
      background: rgba(255,255,255,.18); color: #c7d2fe;
    }
    .header-link {
      margin-left: auto; font-size: 0.75rem; color: #bfdbfe;
      text-decoration: none; white-space: nowrap;
    }
    .header-link:hover { text-decoration: underline; }

    /* ── Setup Screen ── */
    #setup-screen {
      max-width: 580px; margin: 32px auto; padding: 0 16px 60px;
    }
    .setup-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; padding: 28px;
    }
    .setup-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: #e2e8f0; }
    .form-group { margin-bottom: 18px; }
    .field-label {
      display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 6px;
    }
    .field-label .req { color: #f87171; margin-left: 3px; }
    input[type=text], input[type=url], input[type=email], input[type=number],
    input[type=date], select, textarea {
      width: 100%; background: #0f172a; border: 1px solid #475569;
      border-radius: 8px; padding: 10px 12px; color: #f1f5f9;
      font-size: 0.9rem; font-family: inherit; transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; }
    textarea { resize: vertical; }
    select option { background: #1e293b; }

    .type-btns { display: flex; gap: 10px; }
    .type-btn {
      flex: 1; padding: 12px 8px; background: #0f172a;
      border: 2px solid #334155; border-radius: 8px; color: #94a3b8;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: all .2s; text-align: center;
    }
    .type-btn.active { border-color: #3b82f6; background: #1e3a5f; color: #60a5fa; }

    /* URL ヒント */
    .url-hint {
      font-size: 0.75rem; color: #64748b; margin-top: 5px; line-height: 1.5;
    }
    .url-hint span { color: #38bdf8; }

    .btn-primary {
      width: 100%; padding: 14px; margin-top: 4px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Main Layout ── */
    #main-layout { display: none; }

    /* SHORT: side-by-side */
    .layout-short {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 52px);
    }
    /* LONG: stacked */
    .layout-long { display: block; }

    /* Video Pane */
    .video-pane {
      background: #000; position: relative; overflow: hidden;
    }
    .layout-short .video-pane {
      height: 100%;
    }
    .layout-long .video-pane {
      height: 42vh; min-height: 200px; max-height: 380px;
      position: sticky; top: 52px; z-index: 100;
    }

    /* iframe */
    .video-pane iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* Loading overlay */
    .video-loading {
      position: absolute; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; transition: opacity .4s;
    }
    .video-loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #334155;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin .8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.82rem; color: #64748b; text-align: center; line-height: 1.6; }

    /* Fallback bar (shown after timeout) */
    .video-fallback {
      display: none;
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.85); padding: 10px 14px;
      font-size: 0.78rem; color: #94a3b8; text-align: center; z-index: 11;
    }
    .video-fallback a { color: #60a5fa; text-decoration: underline; }
    .video-fallback.show { display: block; }

    /* Drive 開く ボタン (always visible) */
    .drive-open-btn {
      display: block; background: rgba(255,255,255,.07);
      border-top: 1px solid #1e293b; padding: 7px 14px;
      font-size: 0.75rem; color: #94a3b8; text-align: center; text-decoration: none;
      transition: background .2s;
    }
    .drive-open-btn:hover { background: rgba(255,255,255,.12); color: #e2e8f0; }
    .layout-short .drive-open-btn { position: absolute; bottom: 0; left: 0; right: 0; }
    .layout-long  .drive-open-btn { position: absolute; bottom: 0; left: 0; right: 0; }

    /* Form Pane */
    .form-pane { padding: 18px 16px 60px; }
    .layout-short .form-pane { overflow-y: auto; height: 100%; }

    /* Client meta */
    .meta-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 14px; margin-bottom: 14px;
    }
    .meta-card h4 { font-size: 0.8rem; font-weight: 700; color: #94a3b8; margin-bottom: 10px; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .meta-field label { font-size: 0.75rem; color: #94a3b8; display: block; margin-bottom: 4px; }
    .meta-field input { font-size: 0.85rem; }

    /* FB header */
    .fb-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .fb-header h3 { font-size: 0.95rem; font-weight: 700; color: #e2e8f0; }
    .fb-counter { font-size: 0.78rem; color: #64748b; }

    /* Slot */
    .fb-slot {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative;
    }
    .fb-slot .num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; background: #2563eb; border-radius: 50%;
      font-size: 0.7rem; font-weight: 700; color: #fff; margin-bottom: 10px;
    }
    .slot-remove {
      position: absolute; top: 10px; right: 10px;
      background: none; border: none; color: #64748b; font-size: 1rem;
      cursor: pointer; padding: 2px 6px; transition: color .2s;
    }
    .slot-remove:hover { color: #ef4444; }
    .slot-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .slot-field label { font-size: 0.73rem; color: #94a3b8; display: block; margin-bottom: 3px; }
    .slot-field input, .slot-field select { font-size: 0.83rem; padding: 8px 10px; }
    .slot-comment label { font-size: 0.73rem; color: #94a3b8; display: block; margin-bottom: 3px; }
    .slot-comment textarea { font-size: 0.83rem; min-height: 58px; padding: 8px 10px; }

    .btn-add {
      width: 100%; padding: 10px; background: none;
      border: 2px dashed #334155; border-radius: 8px; color: #475569;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all .2s;
      margin-bottom: 12px;
    }
    .btn-add:hover:not(:disabled) { border-color: #3b82f6; color: #60a5fa; }
    .btn-add:disabled { opacity: .35; cursor: not-allowed; }

    .max-warn {
      display: none; font-size: 0.75rem; color: #f59e0b;
      margin-bottom: 8px; padding: 6px 10px; background: #1c1400; border-radius: 6px;
    }

    .btn-submit {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #059669, #0d9488);
      color: #fff; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .9; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* Success */
    #success-view {
      display: none; max-width: 480px; margin: 60px auto; padding: 0 20px;
      text-align: center;
    }
    #success-view .icon { font-size: 3rem; margin-bottom: 14px; }
    #success-view h2 { font-size: 1.2rem; color: #34d399; margin-bottom: 10px; }
    #success-view p { font-size: 0.88rem; color: #94a3b8; line-height: 1.7; }

    /* Mobile overrides */
    @media (max-width: 720px) {
      .layout-short {
        grid-template-columns: 1fr !important;
        height: auto !important;
      }
      .layout-short .video-pane {
        height: 35vw; min-height: 180px; max-height: 260px;
        position: sticky; top: 52px; z-index: 100;
      }
      .layout-short .form-pane {
        height: auto; overflow: visible;
      }
      .meta-grid { grid-template-columns: 1fr; }
      .slot-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Setup Screen ── -->
<div id="setup-screen">
  <div class="setup-card">
    <h2>✏️ FBシートを開始する</h2>

    <div class="form-group">
      <label class="field-label">動画の種類 <span class="req">*</span></label>
      <div class="type-btns">
        <div class="type-btn active" id="btn-short" onclick="setType('short')">
          📱 ショート動画<br><small style="font-weight:400;font-size:.75rem;color:#64748b">左右並び</small>
        </div>
        <div class="type-btn" id="btn-long" onclick="setType('long')">
          🎬 長尺動画<br><small style="font-weight:400;font-size:.75rem;color:#64748b">上下並び</small>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="field-label">納品動画のGoogle Drive URL <span class="req">*</span></label>
      <input type="url" id="setup-url"
        placeholder="https://drive.google.com/file/d/〇〇/view?usp=sharing">
      <div class="url-hint">
        ※ Google Drive の共有リンク（<span>「リンクを知っている全員が閲覧可」</span>に設定必須）<br>
        ※ drive.google.com/file/d/... の形式ならすべて対応
      </div>
    </div>

    <div class="form-group">
      <label class="field-label">お客様のお名前</label>
      <input type="text" id="setup-name" placeholder="山田 太郎">
    </div>

    <div class="form-group">
      <label class="field-label">メールアドレス（送信確認用）</label>
      <input type="email" id="setup-email" placeholder="example@email.com">
    </div>

    <div class="form-group">
      <label class="field-label">修正ラウンド</label>
      <select id="setup-round">
        <option value="1">1ラウンド目（初回FB）</option>
        <option value="2">2ラウンド目</option>
        <option value="3">3ラウンド目</option>
        <option value="4">4ラウンド目以降</option>
      </select>
    </div>

    <div id="setup-err" style="display:none;color:#f87171;font-size:.8rem;margin-bottom:12px;padding:8px 12px;background:#1c0000;border-radius:6px;"></div>
    <button class="btn-primary" onclick="startFeedback()">🚀 開始する</button>
  </div>
</div>

<!-- ── Main Layout ── -->
<div id="main-layout">
  <div class="header">
    <h1>✏️ FBシート</h1>
    <span class="badge" id="hdr-round">1R</span>
    <span class="badge" id="hdr-type" style="color:#a5f3fc">ショート</span>
    <a class="header-link" id="hdr-drive-link" href="#" target="_blank" rel="noopener">
      🔗 Driveで動画を開く
    </a>
  </div>
  <div id="layout-wrap"></div>
</div>

<!-- ── Success ── -->
<div id="success-view">
  <div class="icon">✅</div>
  <h2>フィードバックを送信しました！</h2>
  <p>
    内容を確認の上、修正版を制作いたします。<br>
    通常1〜2営業日以内に修正版をお届けします。<br><br>
    ご不明な点はメールにてご連絡ください。<br>
    mono.create.group@gmail.com
  </p>
</div>

<script>
'use strict';
var GAS_URL = 'https://script.google.com/macros/s/AKfycbx5Mta1CzlD-Odanvr9dPtku2TK4PfNe0Fvq_MBHX0UypqY3DgLbZTglcenqf1drfF9vw/exec';
var MAX_SLOTS = 30;
var videoType = 'short';
var driveFileId = '';
var driveOrigUrl = '';
var slotCount = 0;
var slotIdSeed = 0;

/* ── URL params ── */
(function() {
  var p = new URLSearchParams(location.search);
  if (p.get('url'))    { document.getElementById('setup-url').value   = p.get('url'); }
  if (p.get('name'))   { document.getElementById('setup-name').value  = p.get('name'); }
  if (p.get('email'))  { document.getElementById('setup-email').value = p.get('email'); }
  if (p.get('round'))  { document.getElementById('setup-round').value = p.get('round'); }
  if (p.get('type'))   { setType(p.get('type')); }
  if (p.get('url') && p.get('go') === '1') startFeedback();
})();

function setType(t) {
  videoType = t === 'long' ? 'long' : 'short';
  document.getElementById('btn-short').classList.toggle('active', videoType === 'short');
  document.getElementById('btn-long').classList.toggle('active',  videoType === 'long');
}

/* ── Drive URL → fileId ── */
function parseDriveId(url) {
  if (!url) return '';
  // /file/d/FILE_ID
  var m1 = url.match(/\/file\/d\/([a-zA-Z0-9_\-]{10,})/);
  if (m1) return m1[1];
  // ?id=FILE_ID or &id=FILE_ID
  var m2 = url.match(/[?&]id=([a-zA-Z0-9_\-]{10,})/);
  if (m2) return m2[1];
  // /d/FILE_ID (Google Docs pattern)
  var m3 = url.match(/\/d\/([a-zA-Z0-9_\-]{10,})/);
  if (m3) return m3[1];
  return '';
}

function buildPreviewUrl(fileId) {
  return 'https://drive.google.com/file/d/' + fileId + '/preview';
}

function buildDirectUrl(fileId) {
  return 'https://drive.google.com/file/d/' + fileId + '/view';
}

/* ── Start ── */
function startFeedback() {
  var url   = (document.getElementById('setup-url').value   || '').trim();
  var name  = (document.getElementById('setup-name').value  || '').trim();
  var email = (document.getElementById('setup-email').value || '').trim();
  var round = document.getElementById('setup-round').value  || '1';

  var err = document.getElementById('setup-err');
  err.style.display = 'none';

  if (!url) {
    err.textContent = '納品動画のGoogle Drive URLを入力してください。';
    err.style.display = 'block';
    return;
  }

  driveFileId = parseDriveId(url);
  if (!driveFileId) {
    err.textContent = 'Drive URLの形式を確認してください。\n例: https://drive.google.com/file/d/xxxxxxxx/view?usp=sharing';
    err.style.display = 'block';
    return;
  }

  driveOrigUrl = url;

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-layout').style.display  = 'block';

  document.getElementById('hdr-round').textContent = round + 'R';
  document.getElementById('hdr-type').textContent  = videoType === 'short' ? 'ショート' : '長尺';
  var dl = document.getElementById('hdr-drive-link');
  dl.href = buildDirectUrl(driveFileId);

  buildLayout({ name: name, email: email, round: round });
}

/* ── Build Layout ── */
function buildLayout(meta) {
  var wrap = document.getElementById('layout-wrap');
  var previewUrl = buildPreviewUrl(driveFileId);
  var directUrl  = buildDirectUrl(driveFileId);

  var outerCls = videoType === 'short' ? 'layout-short' : 'layout-long';

  wrap.innerHTML =
    '<div class="' + outerCls + '" id="main-grid">' +
      // --- Video pane ---
      '<div class="video-pane" id="video-pane">' +
        '<div class="video-loading" id="video-loading">' +
          '<div class="spinner"></div>' +
          '<div class="loading-text">動画を読み込み中…<br><small>初回は数秒かかることがあります</small></div>' +
        '</div>' +
        '<iframe id="video-iframe"' +
          ' src="' + previewUrl + '"' +
          ' allow="autoplay; encrypted-media; fullscreen"' +
          ' allowfullscreen' +
          ' onload="onIframeLoad()"' +
        '></iframe>' +
        '<div class="video-fallback" id="video-fallback">' +
          '動画が表示されない場合 → ' +
          '<a href="' + directUrl + '" target="_blank" rel="noopener">Driveで動画を開く</a>' +
          '（同じブラウザでGoogleにログインしてから再表示してください）' +
        '</div>' +
        '<a class="drive-open-btn" href="' + directUrl + '" target="_blank" rel="noopener">' +
          '↗ Driveで動画を開く' +
        '</a>' +
      '</div>' +
      // --- Form pane ---
      '<div class="form-pane" id="form-pane">' +
        buildFormHtml(meta) +
      '</div>' +
    '</div>';

  // 1スロット追加
  addSlot();

  // 15秒後もローディングなら fallback 表示
  setTimeout(function() {
    var ld = document.getElementById('video-loading');
    if (ld && !ld.classList.contains('hidden')) {
      document.getElementById('video-fallback').classList.add('show');
    }
  }, 15000);
}

function onIframeLoad() {
  var ld = document.getElementById('video-loading');
  if (ld) ld.classList.add('hidden');
}

function buildFormHtml(meta) {
  return '<div class="meta-card">' +
      '<h4>📋 お客様情報</h4>' +
      '<div class="meta-grid">' +
        '<div class="meta-field"><label>お名前</label>' +
          '<input type="text" id="fb-name" placeholder="山田 太郎" value="' + esc(meta.name) + '"></div>' +
        '<div class="meta-field"><label>メールアドレス</label>' +
          '<input type="email" id="fb-email" placeholder="example@email.com" value="' + esc(meta.email) + '"></div>' +
      '</div>' +
    '</div>' +
    '<div class="fb-header">' +
      '<h3>📝 修正箇所の記入</h3>' +
      '<span class="fb-counter" id="fb-count">0 / ' + MAX_SLOTS + '件</span>' +
    '</div>' +
    '<div class="max-warn" id="max-warn">⚠ 最大' + MAX_SLOTS + '箇所まで入力できます</div>' +
    '<div id="slots"></div>' +
    '<button class="btn-add" id="btn-add" onclick="addSlot()">＋ 修正箇所を追加</button>' +
    '<button class="btn-submit" id="btn-submit" onclick="submitFB()">📤 フィードバックを送信する</button>';
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

/* ── Slots ── */
function addSlot() {
  if (slotCount >= MAX_SLOTS) return;
  slotCount++;
  slotIdSeed++;
  var id = 'slot-' + slotIdSeed;

  var container = document.getElementById('slots');
  var div = document.createElement('div');
  div.className = 'fb-slot';
  div.id = id;
  div.innerHTML =
    '<span class="num" id="num-' + id + '">' + slotCount + '</span>' +
    (slotCount > 1 ? '<button class="slot-remove" onclick="removeSlot(\'' + id + '\')" title="このスロットを削除">✕</button>' : '') +
    '<div class="slot-row">' +
      '<div class="slot-field">' +
        '<label>タイムコード（例: 0:23）</label>' +
        '<input type="text" name="time" placeholder="0:00">' +
      '</div>' +
      '<div class="slot-field">' +
        '<label>修正の種類</label>' +
        '<select name="type">' +
          '<option value="">選択</option>' +
          '<option>カット編集</option>' +
          '<option>テロップ修正</option>' +
          '<option>テロップ追加</option>' +
          '<option>BGM変更</option>' +
          '<option>SE追加/変更</option>' +
          '<option>速度調整</option>' +
          '<option>色調整</option>' +
          '<option>エフェクト追加</option>' +
          '<option>画面切替</option>' +
          '<option>ナレーション修正</option>' +
          '<option>その他</option>' +
        '</select>' +
      '</div>' +
    '</div>' +
    '<div class="slot-comment">' +
      '<label>修正内容の詳細</label>' +
      '<textarea name="comment" placeholder="例：0:23 のテロップが「お客様」→「お客さま」に修正お願いします"></textarea>' +
    '</div>';

  container.appendChild(div);
  updateCount();

  if (slotCount >= MAX_SLOTS) {
    document.getElementById('btn-add').disabled = true;
    document.getElementById('max-warn').style.display = 'block';
  }
}

function removeSlot(id) {
  var el = document.getElementById(id);
  if (el) { el.remove(); slotCount--; }
  var addBtn = document.getElementById('btn-add');
  if (addBtn) addBtn.disabled = false;
  document.getElementById('max-warn').style.display = 'none';
  // 番号振り直し
  document.querySelectorAll('#slots .fb-slot').forEach(function(s, i) {
    var numEl = s.querySelector('.num');
    if (numEl) numEl.textContent = i + 1;
  });
  updateCount();
}

function updateCount() {
  var el = document.getElementById('fb-count');
  if (el) el.textContent = slotCount + ' / ' + MAX_SLOTS + '件';
}

/* ── Submit ── */
function submitFB() {
  var name  = (document.getElementById('fb-name')  || {}).value  || '';
  var email = (document.getElementById('fb-email') || {}).value  || '';
  var round = document.getElementById('setup-round') ? document.getElementById('setup-round').value : '1';

  var items = [];
  document.querySelectorAll('#slots .fb-slot').forEach(function(slot) {
    var time    = (slot.querySelector('[name=time]')    || {}).value || '';
    var type    = (slot.querySelector('[name=type]')    || {}).value || '';
    var comment = (slot.querySelector('[name=comment]') || {}).value || '';
    if (time || comment) items.push({ time: time, type: type, comment: comment });
  });

  if (!items.length) {
    alert('修正箇所を少なくとも1つ入力してください。');
    return;
  }

  var btn = document.getElementById('btn-submit');
  if (btn) { btn.disabled = true; btn.textContent = '送信中…'; }

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action:       'save_feedback',
      client_name:  name,
      email:        email,
      delivery_url: buildDirectUrl(driveFileId),
      round:        round,
      video_type:   videoType,
      items:        items
    }),
    redirect: 'follow'
  })
  .then(function() {
    document.getElementById('main-layout').style.display  = 'none';
    document.getElementById('success-view').style.display = 'block';
  })
  .catch(function() {
    if (btn) { btn.disabled = false; btn.textContent = '📤 フィードバックを送信する'; }
    alert('送信に失敗しました。もう一度お試しください。');
  });
}
</script>
</body>
</html>
