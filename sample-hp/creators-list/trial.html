<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<title>編集トライアル｜クリエイターズリスト｜mono.create</title>
<meta name="description" content="mono.create 編集者トライアル(お試し編集課題)のご案内・提出ページです。">
<meta name="robots" content="noindex,nofollow">
<style>
  :root{
    --brand:#0ea5a3;
    --brand2:#4f46e5;
    --ink:#0f172a;
    --sub:#64748b;
    --bg:#f7fbfa;
    --line:#e2e8f0;
    --danger:#dc2626;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;color:var(--ink);background:var(--bg);line-height:1.85;word-break:keep-all;line-break:strict;overflow-wrap:break-word;min-height:100vh;}
  a{color:inherit;}
  header{background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
  .nav-inner{display:flex;align-items:center;gap:10px;padding:14px 24px;max-width:640px;margin:0 auto;}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:15px;text-decoration:none;}
  .logo img{width:32px;height:32px;border-radius:9px;box-shadow:0 2px 8px rgba(15,23,42,.12);}
  .logo .lg-sub{display:block;font-size:9.5px;font-weight:700;color:var(--sub);letter-spacing:.1em;}

  .wrap{max-width:640px;margin:0 auto;padding:36px 20px 64px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:32px 26px;}
  .badge{display:inline-block;background:#ecfdf9;color:#0f766e;font-size:12px;font-weight:800;padding:6px 16px;border-radius:99px;margin-bottom:16px;}
  h1{font-size:clamp(19px,4vw,24px);font-weight:900;line-height:1.5;margin-bottom:10px;}
  .lead{color:var(--sub);font-size:13.5px;margin-bottom:26px;}

  .row{margin-bottom:20px;}
  .row .lb{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:6px;display:block;}
  .row .val{font-size:14.5px;font-weight:700;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .row .val a{color:var(--brand2);text-decoration:underline;word-break:break-all;}
  .row .val.brief{white-space:pre-wrap;line-height:1.9;font-weight:500;}

  .deadline-box{background:linear-gradient(135deg,#0f766e,#134e4a);color:#fff;border-radius:16px;padding:20px 22px;margin-bottom:24px;text-align:center;}
  .deadline-box .lb{font-size:11.5px;color:#bae6dc;font-weight:800;letter-spacing:.05em;margin-bottom:6px;}
  .deadline-box .dt{font-size:19px;font-weight:900;}
  .deadline-box .remain{font-size:12.5px;color:#bae6dc;margin-top:8px;}
  .deadline-box.over{background:linear-gradient(135deg,#b91c1c,#7f1d1d);}
  .deadline-box.over .lb,.deadline-box.over .remain{color:#fecaca;}

  input[type=date]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:14.5px;font-family:inherit;color:var(--ink);background:#fff;}
  input[type=url],input[type=text],textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;font-size:14.5px;font-family:inherit;color:var(--ink);background:#fff;}
  textarea{resize:vertical;min-height:90px;}

  .radio-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .radio-opt{border:1.5px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;text-align:center;transition:.15s;}
  .radio-opt input{display:none;}
  .radio-opt .t{font-weight:800;font-size:14px;}
  .radio-opt .s{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .radio-opt.on{border-color:var(--brand);background:#ecfdf9;}

  .preview{margin-top:14px;padding:14px 16px;border-radius:12px;background:var(--bg);border:1px dashed var(--line);font-size:13px;color:var(--sub);text-align:center;}
  .preview b{color:var(--ink);font-size:15px;}

  .btn{width:100%;padding:15px;border:none;border-radius:99px;font-weight:800;font-size:14.5px;cursor:pointer;background:linear-gradient(90deg,var(--brand),#0f766e);color:#fff;box-shadow:0 8px 24px rgba(14,165,163,.3);transition:.15s;}
  .btn:hover{transform:translateY(-2px);}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-note{font-size:11.5px;color:var(--sub);text-align:center;margin-top:12px;}

  .err-text{color:var(--danger);font-size:12.5px;margin-top:10px;display:none;}
  .state-loading,.state-error{text-align:center;padding:70px 20px;}
  .state-error h2{font-size:18px;font-weight:900;margin-bottom:12px;}
  .state-error p{color:var(--sub);font-size:13.5px;}
  .done-ic{width:56px;height:56px;border-radius:50%;background:#ecfdf9;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
  footer{text-align:center;font-size:11.5px;color:var(--sub);padding:24px;}
</style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a class="logo" href="./">
      <img src="favicon.svg" alt="クリエイターズリスト ロゴ">
      <span>クリエイターズリスト<span class="lg-sub">動画編集者派遣 by mono.create</span></span>
    </a>
  </div>
</header>

<div class="wrap" id="app">
  <div class="state-loading" id="state-loading">
    <p style="color:var(--sub);font-size:13.5px;">読み込んでいます…</p>
  </div>
</div>

<footer>© mono.create ／ クリエイターズリスト(動画編集者派遣)</footer>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwa-9RybumgsbuFj5HrDFogrla7MefrnLRbOKuT-eJfJ-garxQXuUwFh3LOgdhsPYLxRw/exec';

function qs(name) {
  return new URLSearchParams(location.search).get(name);
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// GASが返す 'yyyy/MM/dd HH:mm' (JST) を絶対時刻(ms)に変換
function jstStrToMs(s) {
  const m = String(s || '').match(/^(\d{4})\/(\d{2})\/(\d{2})\s+(\d{2}):(\d{2})$/);
  if (!m) return null;
  return Date.UTC(+m[1], +m[2]-1, +m[3], +m[4], +m[5]) - 9 * 60 * 60 * 1000;
}
function todayJstDateStr() {
  const now = new Date();
  const jstMs = now.getTime() + (9 * 60 - now.getTimezoneOffset()) * 60000;
  const j = new Date(jstMs);
  const p = n => String(n).padStart(2, '0');
  return `${j.getUTCFullYear()}-${p(j.getUTCMonth()+1)}-${p(j.getUTCDate())}`;
}
function addDaysStr(dateStr, days) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const ms = Date.UTC(y, m - 1, d) + days * 24 * 60 * 60 * 1000;
  const j = new Date(ms);
  const p = n => String(n).padStart(2, '0');
  return `${j.getUTCFullYear()}/${p(j.getUTCMonth()+1)}/${p(j.getUTCDate())}`;
}

const app = document.getElementById('app');
const token = qs('token');

function renderError(title, msg) {
  app.innerHTML = `
    <div class="card state-error">
      <h2>${esc(title)}</h2>
      <p>${esc(msg)}</p>
    </div>`;
}

function renderInvited(d) {
  app.innerHTML = `
    <div class="card">
      <span class="badge">トライアル課題</span>
      <h1>${esc(d.name)}<wbr> 様、<wbr>お試し<wbr>編集<wbr>課題の<wbr>ご案内です</h1>
      <p class="lead">開始日と<wbr>納期を<wbr>選んで<wbr>ください。<wbr>選択後、<wbr>納期の<wbr>日時が<wbr>確定します。</p>

      <div class="row"><span class="lb">素材</span><div class="val"><a href="${esc(d.materialUrl)}" target="_blank" rel="noopener">${esc(d.materialUrl)}</a></div></div>
      <div class="row"><span class="lb">編集内容</span><div class="val brief">${esc(d.brief)}</div></div>

      <div class="row">
        <span class="lb">開始日</span>
        <input type="date" id="start-date" min="${todayJstDateStr()}" value="${todayJstDateStr()}">
      </div>
      <div class="row">
        <span class="lb">納期</span>
        <div class="radio-group">
          <label class="radio-opt on" id="opt-1"><input type="radio" name="dur" value="1" checked><div class="t">1日後</div><div class="s">開始+24時間</div></label>
          <label class="radio-opt" id="opt-2"><input type="radio" name="dur" value="2"><div class="t">2日後</div><div class="s">開始+48時間</div></label>
        </div>
        <div class="preview" id="preview"></div>
      </div>

      <button class="btn" id="btn-start">この内容で開始する</button>
      <p class="err-text" id="err-start"></p>
      <p class="btn-note">開始すると納期のカウントが始まります。準備ができてから開始してください。</p>
    </div>`;

  const dateInput = document.getElementById('start-date');
  const opt1 = document.getElementById('opt-1');
  const opt2 = document.getElementById('opt-2');
  const preview = document.getElementById('preview');

  function updatePreview() {
    const dur = document.querySelector('input[name=dur]:checked').value;
    opt1.classList.toggle('on', dur === '1');
    opt2.classList.toggle('on', dur === '2');
    const dateStr = dateInput.value || todayJstDateStr();
    const deadline = addDaysStr(dateStr, Number(dur));
    preview.innerHTML = `納期: <b>${esc(deadline)} 00:00</b>（JST）`;
  }
  dateInput.addEventListener('change', updatePreview);
  opt1.addEventListener('click', () => { opt1.querySelector('input').checked = true; updatePreview(); });
  opt2.addEventListener('click', () => { opt2.querySelector('input').checked = true; updatePreview(); });
  updatePreview();

  document.getElementById('btn-start').addEventListener('click', async () => {
    const btn = document.getElementById('btn-start');
    const err = document.getElementById('err-start');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '処理中…';
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'trial_start', token, startAt: dateInput.value, durationDays: Number(document.querySelector('input[name=dur]:checked').value) })
      });
      const j = await res.json();
      if (j.error) { err.textContent = 'エラー: ' + j.error; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'この内容で開始する'; return; }
      load();
    } catch (e) {
      err.textContent = '通信エラーが発生しました。時間をおいて再度お試しください。';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'この内容で開始する';
    }
  });
}

let countdownTimer = null;

function renderRunning(d) {
  if (countdownTimer) clearInterval(countdownTimer);
  app.innerHTML = `
    <div class="card">
      <span class="badge">進行中</span>
      <h1>${esc(d.name)}<wbr> 様</h1>
      <p class="lead">納期までに<wbr>成果物リンクを<wbr>ご提出ください。</p>

      <div class="deadline-box" id="deadline-box">
        <div class="lb">納期</div>
        <div class="dt">${esc(d.deadlineAt)}</div>
        <div class="remain" id="remain"></div>
      </div>

      <div class="row"><span class="lb">開始日時</span><div class="val">${esc(d.startAt)}</div></div>
      <div class="row"><span class="lb">素材</span><div class="val"><a href="${esc(d.materialUrl)}" target="_blank" rel="noopener">${esc(d.materialUrl)}</a></div></div>
      <div class="row"><span class="lb">編集内容</span><div class="val brief">${esc(d.brief)}</div></div>

      <div class="row">
        <span class="lb">成果物URL(必須)</span>
        <input type="url" id="submit-url" placeholder="https://drive.google.com/...">
      </div>
      <div class="row">
        <span class="lb">コメント(任意)</span>
        <textarea id="submit-notes" placeholder="工夫した点・確認してほしい点など"></textarea>
      </div>

      <button class="btn" id="btn-submit">成果物を提出する</button>
      <p class="err-text" id="err-submit"></p>
    </div>`;

  const box = document.getElementById('deadline-box');
  const remainEl = document.getElementById('remain');
  const deadlineMs = jstStrToMs(d.deadlineAt);

  function tick() {
    const diff = deadlineMs - Date.now();
    if (diff <= 0) {
      box.classList.add('over');
      remainEl.textContent = '納期を超過しています。至急ご提出ください。';
      return;
    }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    remainEl.textContent = `残り ${h}時間${m}分`;
  }
  tick();
  countdownTimer = setInterval(tick, 30000);

  document.getElementById('btn-submit').addEventListener('click', async () => {
    const btn = document.getElementById('btn-submit');
    const err = document.getElementById('err-submit');
    const url = document.getElementById('submit-url').value.trim();
    err.style.display = 'none';
    if (!url) { err.textContent = '成果物URLを入力してください。'; err.style.display = 'block'; return; }
    btn.disabled = true;
    btn.textContent = '送信中…';
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'trial_submit', token, url, notes: document.getElementById('submit-notes').value.trim() })
      });
      const j = await res.json();
      if (j.error) { err.textContent = 'エラー: ' + j.error; err.style.display = 'block'; btn.disabled = false; btn.textContent = '成果物を提出する'; return; }
      if (countdownTimer) clearInterval(countdownTimer);
      load();
    } catch (e) {
      err.textContent = '通信エラーが発生しました。時間をおいて再度お試しください。';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '成果物を提出する';
    }
  });
}

function renderSubmitted(d) {
  if (countdownTimer) clearInterval(countdownTimer);
  app.innerHTML = `
    <div class="card" style="text-align:center;">
      <div class="done-ic">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0f766e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h1>提出<wbr>ありがとう<wbr>ございました</h1>
      <p class="lead">${esc(d.name)}<wbr> 様の<wbr>成果物を<wbr>受け付けました。<br>担当者が<wbr>内容を<wbr>確認のうえ、<wbr>面談の<wbr>ご案内を<wbr>メールで<wbr>お送りします。</p>
      <div class="row" style="text-align:left;"><span class="lb">提出内容</span><div class="val"><a href="${esc(d.submitUrl)}" target="_blank" rel="noopener">${esc(d.submitUrl)}</a></div></div>
    </div>`;
}

async function load() {
  if (!token) {
    renderError('リンクが正しくありません', 'トライアルページへのリンクにトークンが含まれていません。ご案内メールのリンクからアクセスしてください。');
    return;
  }
  try {
    const res = await fetch(`${GAS_URL}?action=trial_get&token=${encodeURIComponent(token)}`);
    const j = await res.json();
    if (j.error) {
      renderError('リンクが無効です', 'このリンクは無効か、有効期限が切れています。ご案内メールを再度ご確認いただくか、mono.create.group@gmail.com までご連絡ください。');
      return;
    }
    if (j.status === '進行中') { renderRunning(j); return; }
    if (j.status === '提出済' || j.status === '面談待ち' || j.status === '合格' || j.status === '不合格') { renderSubmitted(j); return; }
    renderInvited(j);
  } catch (e) {
    renderError('読み込みに失敗しました', '通信エラーが発生しました。時間をおいて再度アクセスしてください。');
  }
}

load();
</script>

</body>
</html>
