<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>編集者への口コミ投稿 | クリエイターズリスト mono.create</title>
<style>
  :root{
    --teal:#0ea5a3; --teal-d:#0b8583; --teal-bg:#e6f7f6;
    --ink:#1e293b; --sub:#64748b; --line:#e2e8f0; --bg:#f5f7fb;
    --red:#dc2626; --ok:#059669; --star:#f59e0b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;}
  .wrap{max-width:640px;margin:0 auto;padding:28px 18px 80px;}
  .brand{font-size:12px;font-weight:800;color:var(--teal-d);letter-spacing:.06em;margin-bottom:4px;}
  h1{font-size:22px;font-weight:800;margin-bottom:6px;}
  .lead{font-size:13px;color:var(--sub);margin-bottom:18px;}
  .info{background:var(--teal-bg);border:1px solid rgba(14,165,163,.3);border-radius:12px;padding:14px 16px;font-size:12.5px;margin-bottom:22px;color:var(--ink);}
  .info b{color:var(--teal-d);}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px 20px;box-shadow:0 2px 10px rgba(15,23,42,.04);}
  label{display:block;font-size:12px;font-weight:800;color:var(--sub);margin:16px 0 5px;}
  label .req{color:var(--red);font-size:10.5px;margin-left:5px;}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);border-color:transparent;}
  textarea{min-height:100px;resize:vertical;}
  /* 星評価 */
  .star-row{display:flex;gap:6px;margin:6px 0;}
  .star-btn{font-size:30px;color:#d1d5db;cursor:pointer;line-height:1;background:none;border:none;padding:0;transition:color .15s;}
  .star-btn.on{color:var(--star);}
  .star-btn:hover,.star-btn:hover ~ .star-btn{color:var(--star);}
  .star-label{font-size:13px;color:var(--sub);margin-left:8px;line-height:2.2;}
  #stars-hidden{display:none;}
  .btn{width:100%;margin-top:20px;padding:15px;border:none;border-radius:11px;background:var(--teal);color:#fff;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit;}
  .btn:hover{background:var(--teal-d);}
  .btn:disabled{opacity:.55;cursor:not-allowed;}
  .err{color:var(--red);font-size:12.5px;margin-top:10px;display:none;}
  .done{display:none;text-align:center;padding:40px 20px;}
  .done .mark{font-size:44px;}
  .done h2{font-size:18px;margin:10px 0 8px;}
  .done p{font-size:13px;color:var(--sub);}
  .done .btn{max-width:280px;background:#fff;color:var(--teal-d);border:1.5px solid var(--teal);}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">CREATORS LIST | mono.create</div>
  <h1>⭐ 編集者への口コミ投稿</h1>
  <p class="lead">担当いただいた編集者への評価をお寄せください。<br>投稿いただいた口コミは審査後、編集者プロフィールに反映されます。</p>

  <div class="info">
    <b>ご注意</b><br>
    実際に弊社サービスをご利用いただいたクライアント様のみ投稿できます。<br>
    不適切な内容は非公開となります。投稿は管理者が確認後に公開されます。
  </div>

  <div class="card" id="form-card">
    <label>担当編集者<span class="req">必須</span></label>
    <select id="r-editor"><option value="">読み込み中...</option></select>

    <label>総合評価<span class="req">必須</span></label>
    <div style="display:flex;align-items:center;">
      <div class="star-row" id="star-row">
        <button type="button" class="star-btn" data-v="1" onclick="setStar(1)">★</button>
        <button type="button" class="star-btn" data-v="2" onclick="setStar(2)">★</button>
        <button type="button" class="star-btn" data-v="3" onclick="setStar(3)">★</button>
        <button type="button" class="star-btn" data-v="4" onclick="setStar(4)">★</button>
        <button type="button" class="star-btn" data-v="5" onclick="setStar(5)">★</button>
      </div>
      <span class="star-label" id="star-label">タップで評価</span>
    </div>
    <input type="hidden" id="r-stars" value="0">

    <label>コメント<span class="req">必須</span></label>
    <textarea id="r-comment" placeholder="例: テロップのデザインセンスが抜群で、修正対応も迅速でした。またお願いしたいです。"></textarea>

    <label>会社名・屋号<span class="req">必須</span></label>
    <input id="r-company" type="text" placeholder="例: 株式会社◯◯ / 個人でご利用の場合は「個人」と入力">

    <label>お名前(任意・非公開)</label>
    <input id="r-name" type="text" placeholder="例: 田中 太郎(公開されません)">

    <button class="btn" id="r-submit" onclick="submitReview()">口コミを投稿する</button>
    <p class="err" id="r-err"></p>
  </div>

  <div class="done card" id="done-card">
    <div class="mark">✅</div>
    <h2>口コミを受け付けました</h2>
    <p>ありがとうございます。<br>管理者が確認後、編集者プロフィールに反映されます。</p>
    <button class="btn" onclick="location.reload()">別の編集者に口コミを投稿する</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx5Mta1CzlD-Odanvr9dPtku2TK4PfNe0Fvq_MBHX0UypqY3DgLbZTglcenqf1drfF9vw/exec';
const escH = s => String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const STAR_LABELS = ['','とても悪い','悪い','普通','良い','とても良い'];

// 星ボタン制御
function setStar(n){
  document.getElementById('r-stars').value = n;
  document.getElementById('star-label').textContent = '★'.repeat(n) + '☆'.repeat(5-n) + '  ' + STAR_LABELS[n];
  document.querySelectorAll('.star-btn').forEach(b=>{
    b.classList.toggle('on', Number(b.dataset.v) <= n);
  });
}

// 編集者リスト読み込み
(async function(){
  const sel = document.getElementById('r-editor');
  try{
    const res = await fetch(GAS_URL + '?action=editors');
    const json = await res.json();
    const names = (json.data||[]).map(e=>e.name).filter(Boolean);
    if(!names.length) throw new Error('no editors');
    sel.innerHTML = '<option value="">選択してください</option>'
      + names.map(n=>`<option value="${escH(n)}">${escH(n)}</option>`).join('');
  }catch(e){
    sel.innerHTML = '<option value="">編集者一覧を取得できませんでした。時間をおいて再度お試しください。</option>';
  }
})();

async function submitReview(){
  const editor  = document.getElementById('r-editor').value.trim();
  const stars   = Number(document.getElementById('r-stars').value);
  const comment = document.getElementById('r-comment').value.trim();
  const company = document.getElementById('r-company').value.trim();
  const name    = document.getElementById('r-name').value.trim();
  const err     = document.getElementById('r-err');

  if(!editor){
    err.textContent='担当編集者を選択してください。';err.style.display='block';return;
  }
  if(stars < 1){
    err.textContent='星評価を選択してください。';err.style.display='block';return;
  }
  if(!comment){
    err.textContent='コメントを入力してください。';err.style.display='block';return;
  }
  if(!company){
    err.textContent='会社名・屋号を入力してください。';err.style.display='block';return;
  }
  err.style.display='none';
  const btn = document.getElementById('r-submit');
  btn.disabled=true; btn.textContent='送信中...';

  const payload = {
    action: 'creator_dispatch_request',
    genre: '⭐口コミ',
    company: '[口コミ] ' + editor,
    contact_name: editor,
    volume: String(stars),
    message: '【口コミ】\n'
      + '編集者: ' + editor + '\n'
      + '星: ' + stars + '\n'
      + '会社名: ' + company + '\n'
      + (name ? '投稿者名: ' + name + '\n' : '')
      + 'コメント: ' + comment
  };

  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(payload)
    });
    let json;
    try{ json = await res.json(); }catch(e){ json = { ok: true, degraded: true }; }
    // GAS POST応答が読めない障害対策(2026-07-04観測): 実行自体は成功しているため成功扱い
    if(json.ok || json.degraded){
      document.getElementById('form-card').style.display='none';
      document.getElementById('done-card').style.display='block';
      window.scrollTo(0,0);
      return;
    }
    throw new Error(json.error||'送信に失敗しました');
  }catch(e){
    err.textContent='送信に失敗しました。通信環境をご確認のうえ再度お試しください。';
    err.style.display='block';
  }
  btn.disabled=false; btn.textContent='口コミを投稿する';
}
</script>
</body>
</html>
