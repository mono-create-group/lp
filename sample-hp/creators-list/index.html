<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<title>クリエイターズリスト｜mono.create — 動画編集者派遣</title>
<meta name="description" content="動画編集者派遣「クリエイターズリスト」。編集を依頼したい方と、編集者として働きたい方の入口ページです。">
<style>
  :root{
    --client:#4f46e5;
    --editor:#0ea5a3;
    --ink:#0f172a;
    --sub:#64748b;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;
    color:var(--ink);min-height:100vh;display:flex;flex-direction:column;
    background:
      radial-gradient(700px 500px at 10% 0%,rgba(79,70,229,.10),transparent 60%),
      radial-gradient(700px 500px at 90% 100%,rgba(14,165,163,.10),transparent 60%),
      #f8faff;
    line-height:1.8;word-break:keep-all;overflow-wrap:anywhere;
  }
  .top{text-align:center;padding:56px 20px 16px;}
  .logo{font-weight:900;font-size:22px;}
  .logo span{background:linear-gradient(90deg,var(--client),var(--editor));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .top p{color:var(--sub);font-size:13.5px;margin-top:8px;}
  .choices{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:22px;max-width:900px;width:100%;margin:26px auto 40px;padding:0 20px;}
  .choice{
    border-radius:26px;padding:52px 30px;text-align:center;text-decoration:none;color:#fff;
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;
    transition:transform .2s ease,box-shadow .2s ease;position:relative;overflow:hidden;
  }
  .choice:hover{transform:translateY(-6px);}
  .choice .ic{font-size:46px;margin-bottom:6px;}
  .choice h2{font-size:clamp(19px,3vw,25px);font-weight:900;line-height:1.5;}
  .choice p{font-size:13px;opacity:.9;}
  .choice .go{margin-top:18px;background:#fff;border-radius:99px;padding:12px 30px;font-weight:800;font-size:14px;}
  .c-client{background:linear-gradient(135deg,#4f46e5,#6d28d9);box-shadow:0 18px 40px rgba(79,70,229,.35);}
  .c-client .go{color:#4f46e5;}
  .c-editor{background:linear-gradient(135deg,#0ea5a3,#0f766e);box-shadow:0 18px 40px rgba(14,165,163,.35);}
  .c-editor .go{color:#0f766e;}
  footer{text-align:center;font-size:11.5px;color:var(--sub);padding:0 20px 28px;}
  @media(max-width:720px){.choices{grid-template-columns:1fr;max-width:480px;}.choice{padding:40px 24px;}}
</style>
</head>
<body>

<div class="top">
  <img src="favicon.svg" alt="クリエイターズリスト ロゴ" style="width:64px;height:64px;border-radius:16px;margin:0 auto 12px;box-shadow:0 6px 18px rgba(15,23,42,.12);">
  <div class="logo">クリエイターズリスト</div>
  <p>動画編集者派遣 <span style="letter-spacing:.06em;">by mono<b style="background:linear-gradient(90deg,#4f46e5,#0ea5a3);-webkit-background-clip:text;background-clip:text;color:transparent;">.create</b></span></p>
</div>

<div class="choices">
  <a class="choice c-client" href="client.html">
    <div class="ic">🎬</div>
    <h2>動画編集を<br>依頼したい</h2>
    <p>企業・クリエイターの方<br>編集者一覧を見て、そのまま相談できます。</p>
    <p style="margin-top:10px;background:rgba(255,255,255,.16);border-radius:99px;padding:6px 16px;font-size:12px;font-weight:700;">ショート ¥4,000〜 ／ 長尺10分 ¥10,000〜</p>
    <span class="go">依頼ページへ →</span>
  </a>
  <a class="choice c-editor" href="editor.html">
    <div class="ic">✂️</div>
    <h2>編集者として<br>働きたい</h2>
    <p>動画編集者の方<br>営業ゼロで案件が届く仕組みです。</p>
    <span class="go">編集者ページへ →</span>
  </a>
</div>

<footer>© mono.create ／ クリエイターズリスト(動画編集者派遣)</footer>

</body>
</html>
