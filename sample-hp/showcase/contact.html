<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="robots" content="noindex,nofollow"><title>お問い合わせ｜ぽいっとHP</title>
<link rel="icon" type="image/png" href="img/favicon.png"><link rel="apple-touch-icon" href="img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#fffdf5;--bg2:#d8fbf3;--ink:#12201b;--mut:#66716b;--teal:#00c2a8;--teal-d:#009e88;--orange:#ff6a1a;--orange-d:#e8560c;--yellow:#ffd21e;--line:#dfeee8;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);line-height:1.9;word-break:keep-all;overflow-wrap:break-word;}
img{max-width:100%;display:block;}
.jp{font-family:"Zen Kaku Gothic New",sans-serif;}
header{position:sticky;top:0;z-index:50;background:rgba(255,253,245,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.nav{max-width:1180px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;}
.logo a{display:block;}
.logo img{height:46px;width:auto;display:block;}
@media(max-width:600px){.logo img{height:38px;}}
.nav ul{display:flex;gap:20px;list-style:none;margin-left:20px;font-size:13.5px;font-weight:700;}
.nav ul a{color:var(--ink);text-decoration:none;}
.nav ul a:hover{color:var(--teal-d);}
@media(max-width:820px){.nav ul{display:none;}}
.cta{background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;min-height:calc(100vh - 71px);}
.cta-in{max-width:1080px;margin:0 auto;padding:52px 24px 64px;text-align:center;}
.cta h1{font-size:clamp(23px,3.6vw,33px);font-weight:900;}
.cta .sub{margin-top:14px;font-size:15px;opacity:.96;}
.form-card{max-width:600px;margin:28px auto 0;background:#fff;border-radius:20px;padding:30px 26px;box-shadow:0 20px 50px rgba(0,0,0,.18);text-align:left;color:var(--ink);}
.form-card .intent{display:flex;gap:10px;margin-bottom:18px;}
.form-card .intent label{flex:1;position:relative;cursor:pointer;}
.form-card .intent input{position:absolute;opacity:0;}
.form-card .intent span{display:block;text-align:center;padding:12px 8px;border:1.5px solid var(--line);border-radius:12px;font-weight:700;font-size:14px;transition:.15s;}
.form-card .intent input:checked+span{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 6px 14px rgba(0,194,168,.3);}
.form-card .fld{margin-bottom:14px;}
.form-card label.lb{display:block;font-size:13px;font-weight:700;margin-bottom:6px;}
.form-card label.lb .req{color:var(--orange-d);font-size:11px;margin-left:6px;}
.form-card input[type=text],.form-card input[type=email],.form-card input[type=tel],.form-card select,.form-card textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 13px;font-size:15px;font-family:inherit;background:#fffefb;color:var(--ink);}
.form-card input:focus,.form-card select:focus,.form-card textarea:focus{outline:none;border-color:var(--teal);}
.form-card textarea{min-height:110px;resize:vertical;line-height:1.7;}
.form-card .submit{width:100%;border:none;background:var(--orange);color:#fff;font-weight:900;font-size:16px;padding:16px;border-radius:50px;cursor:pointer;box-shadow:0 10px 24px rgba(255,106,26,.34);transition:.15s;margin-top:4px;}
.form-card .submit:hover{background:var(--orange-d);}
.form-card .submit:disabled{opacity:.6;cursor:default;}
.form-card .privacy{font-size:11.5px;color:var(--mut);text-align:center;margin-top:12px;line-height:1.7;}
.form-done{display:none;background:#fff;color:var(--ink);border-radius:20px;padding:34px 26px;max-width:600px;margin:28px auto 0;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.18);}
.form-done h2{font-size:20px;font-weight:900;margin-bottom:12px;color:var(--teal-d);}
.form-done p{font-size:14.5px;line-height:1.9;color:#3a443f;}
.back{text-align:center;margin-top:26px;}
.back a{color:#fff;font-size:13px;opacity:.9;}
footer{background:#20302b;color:#c8d3ce;font-size:12.5px;text-align:center;padding:26px 24px;line-height:1.9;}
footer b{color:#fff;}
html,body{overflow-x:hidden;}
@media(max-width:600px){
  .cta-in{padding:38px 16px 52px;}
  .cta h1{font-size:21px;}
  .form-card{padding:22px 16px;}
  .form-card .intent span{font-size:13px;padding:11px 4px;}
  .form-card .intent.bizrow{flex-wrap:wrap;}
.form-card .intent.bizrow label{flex:1 1 46%;}
  .form-card .intent.bizrow span{font-size:12.5px;padding:10px 2px;letter-spacing:0;}
  footer{font-size:11.5px;}
}
</style></head><body>

<header><div class="nav">
  <div class="logo"><a href="index.html"><img src="img/logo.png" alt="ぽいっとHP（HP制作会社・by mono.create）"></a></div>
  <ul>
    <li><a href="index.html#works">制作実績</a></li>
    <li><a href="index.html#compare">料金・比較</a></li>
    <li><a href="index.html#flow">制作の流れ</a></li>
    <li><a href="index.html#faq">よくある質問</a></li>
  </ul>
</div></header>

<section class="cta"><div class="cta-in">
  <h1 class="jp">お問い合わせ</h1>

  <form class="form-card" id="cform" novalidate>
    <div class="intent">
      <label><input type="radio" name="intent" value="無料相談" checked><span>無料で相談する</span></label>
      <label><input type="radio" name="intent" value="資料がほしい"><span>資料がほしい</span></label>
    </div>
    <div class="fld"><label class="lb">ご相談の事業</label></div>
    <div class="intent bizrow">
      <label><input type="radio" name="biz" value="ホームページ制作" checked><span>ホームページ制作</span></label>
      <label><input type="radio" name="biz" value="AI顧問"><span>AI顧問</span></label>
      <label><input type="radio" name="biz" value="自動化ツール開発"><span>自動化ツール開発</span></label>
      <label><input type="radio" name="biz" value="まだ決めていない"><span>まだ決めていない</span></label>
    </div>
    <!-- ハニーポット(ボット対策・人間には見えない位置に配置。埋まっていたらボット送信とみなす) -->
    <div class="fld" aria-hidden="true" style="position:absolute;left:-9999px;top:-9999px;height:0;width:0;overflow:hidden;">
      <label class="lb">Webサイト</label><input type="text" name="_hp" tabindex="-1" autocomplete="off">
    </div>
    <div class="fld"><label class="lb">お名前<span class="req">必須</span></label><input type="text" name="name" required autocomplete="name"></div>
    <div class="fld"><label class="lb">店名・屋号</label><input type="text" name="company" autocomplete="organization" placeholder="例）麺屋 一徹"></div>
    <div class="fld"><label class="lb">メールアドレス<span class="req">必須</span></label><input type="email" name="email" required autocomplete="email" placeholder="例）info@example.com"></div>
    <div class="fld"><label class="lb">電話番号</label><input type="tel" name="phone" autocomplete="tel" placeholder="例）0166-12-3456"></div>
    <div class="fld"><label class="lb">業種</label><select name="genre">
      <option value="">選んでください</option>
      <option>ラーメン・飲食</option><option>カフェ</option><option>居酒屋・バー</option><option>美容室</option><option>ネイル・まつげ</option><option>エステ・サロン</option><option>歯科・クリニック</option><option>整体・整骨院</option><option>パーソナルジム</option><option>建築・工務店</option><option>教室・スクール</option><option>小売・物販</option><option>その他</option>
    </select></div>
    <div class="fld"><label class="lb">ご相談内容</label><textarea name="message" placeholder="「何から始めれば？」だけでもOKです。"></textarea></div>
    <button type="submit" class="submit" id="csend">送信する</button>
    <p class="privacy">送信いただいた内容は、ご相談への対応にのみ使用します。<wbr>1〜2営業日以内にご連絡します。</p>
  </form>

  <div class="form-done" id="cdone">
    <h2>送信しました。ありがとうございます。</h2>
    <p>1〜2営業日以内に、<wbr>メールでご連絡します。</p>
  </div>

  <p class="back"><a href="index.html" id="backLink">← トップページに戻る</a></p>
</div></section>

<script>
(function(){
  var EP='https://script.google.com/macros/s/AKfycbzftG_O0GsR_8_TYwUwSGfSFPMCjXscWfw0jmTIB54H8NrH0SnjgH445IDDOKoHnNt8XA/exec';
  // Cloudflare Turnstileのサイトキー。Cloudflareアカウント側でウィジェット登録後にここへ設定する
  // (会長のみ実行可能なアカウント作成が前提のため、登録が済むまでは空のままにして
  // フォームは通常どおり動作させる。空の間はハニーポット＋経過時間チェックのみで運用)
  var TURNSTILE_SITE_KEY='';
  var formShownAt=Date.now();
  var f=document.getElementById('cform'); if(!f) return;
  if(TURNSTILE_SITE_KEY){
    try{
      var ts=document.createElement('script');
      ts.src='https://challenges.cloudflare.com/turnstile/v0/api.js'; ts.async=true; ts.defer=true;
      document.head.appendChild(ts);
      var tsDiv=document.createElement('div');
      tsDiv.className='cf-turnstile'; tsDiv.setAttribute('data-sitekey',TURNSTILE_SITE_KEY);
      tsDiv.setAttribute('data-size','flexible');
      f.insertBefore(tsDiv, document.getElementById('csend'));
    }catch(e){}
  }
  try{
    var qs=new URLSearchParams(location.search);
    var q=qs.get('intent')||'';
    if(q.indexOf('資料')>=0){ f.querySelector('input[value="資料がほしい"]').checked=true; }
    var biz=qs.get('biz')||'';
    if(!biz){ var mm=q.match(/（(.+?)）/); if(mm) biz=mm[1]; }
    if(biz==='AIアプリ開発'||biz==='業務アプリ開発') biz='自動化ツール開発';
    if(biz){ var bi=f.querySelector('input[name=biz][value="'+biz+'"]'); if(bi) bi.checked=true; }
    var msg=qs.get('msg'); if(msg){ f.message.value=msg; }
    if(document.referrer && history.length>1){
      var bl=document.getElementById('backLink');
      if(bl){ bl.textContent='← 前のページに戻る'; bl.addEventListener('click',function(e){ e.preventDefault(); history.back(); }); }
    }
  }catch(e){}
  f.addEventListener('submit',function(ev){
    ev.preventDefault();
    var name=f.name.value.trim(), email=f.email.value.trim();
    if(!name){ f.name.focus(); return; }
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ f.email.focus(); return; }
    var intent=f.querySelector('input[name=intent]:checked').value;
    var bizv=f.querySelector('input[name=biz]:checked').value;
    intent=intent+'（'+bizv+'）';
    var btn=document.getElementById('csend'); btn.disabled=true; btn.textContent='送信中…';
    var payload={
      name:name,
      company:f.company.value.trim(),
      email:email,
      phone:f.phone.value.trim(),
      genre:f.genre.value||'未選択',
      intent:intent,
      message:f.message.value.trim()||'（内容の記載なし）',
      _hp:(f._hp?f._hp.value:''),
      _t:formShownAt,
      _ts:(function(){ try{ return window.turnstile?window.turnstile.getResponse():''; }catch(e){ return ''; } })()
    };
    fetch(EP,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)})
      .then(function(){ done(); }).catch(function(){ done(); });
  });
  function done(){ f.style.display='none'; var d=document.getElementById('cdone'); d.style.display='block'; d.scrollIntoView({behavior:'smooth',block:'center'}); }
})();
</script>

<footer>
  <b>ぽいっとHP</b>（by mono.create）／ 地域で頑張るお店の「めんどくさい」を引き受けます<br>

</footer>
</body></html>
