<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mono.create｜地方の人手不足に、AIで本気で挑む</title>
<meta name="description" content="人が足りない地方の店とともに、少ない人数で回る仕組みをつくる。AI顧問・自動化ツール開発・ホームページ制作。北海道拠点・全国オンライン対応。">
<link rel="canonical" href="https://mono-create-group.github.io/lp/mono-create/">
<script>
(function(){
  var go = function(){ location.replace('mono-create/'); };
  try{
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(rs){
        rs.forEach(function(r){ r.unregister(); });
      }).catch(function(){});
    }
    if(window.caches && caches.keys){
      caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); })
        .then(go).catch(go);
    } else { go(); }
    setTimeout(go, 1200);
  }catch(e){ go(); }
})();
</script>
</head>
<body style="font-family:sans-serif;text-align:center;padding:60px 20px;">
<p>mono.create公式サイトへ移動します。自動で移動しない場合は<a href="mono-create/">こちら</a>。</p>
</body>
</html>
